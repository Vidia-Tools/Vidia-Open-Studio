name: Mirror to Codeberg

# Pushes every commit on main to the Codeberg mirror that the GPU worker clones
# at boot. GitHub is the source of truth; Codeberg is downstream and read-only.
# Requires repo secret CODEBERG_SSH_KEY: a private SSH key whose public half is
# added as a write deploy key on codeberg.org/Vidia/Vidia-Open-Studio.

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Codeberg
        env:
          CODEBERG_SSH_KEY: ${{ secrets.CODEBERG_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$CODEBERG_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan codeberg.org >> ~/.ssh/known_hosts 2>/dev/null
          git push --force git@codeberg.org:Vidia/Vidia-Open-Studio.git HEAD:main
