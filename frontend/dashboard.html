<!DOCTYPE html>
<html lang="en">
<head>
    <script type="module">
      import { initAnalytics } from "/js/analytics.js";
      initAnalytics();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDIA: Reimagine Reality</title>
    <link rel="icon" type="image/x-icon" href="/assets/icon2.ico">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/mobile.css" media="(max-width: 768px)">
    
    <!-- External libraries -->
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js" type="text/javascript"></script>
</head>
<body>
    <div id="notificationsContainer" class="notifications-container"></div>
    <div id="header-placeholder"></div>
    <div class="mode-indicator">
        <div class="mode-back">
            <a href="/" class="back-arrow">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Back
            </a>
        </div>
        <div class="mode-info">
            <div class="mode-logo"></div>
            <h2 class="mode-title"></h2>
        </div>
    </div>

    <div class="container">
        <div id="signupModal" class="modal" style="display: none;">
        </div>
        <div id="genericModal" class="modal" style="display: none;">
        </div>
        <div class="prompt-generate-container">
            <div class="main-section">
                <div id="uploadArea" class="upload-area" data-helper="UPLOAD.DEFAULT">
                    <svg class="upload-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 15L30 35h14v26h12V35h14L50 15zm-20 70h40v-10H30v10z"/>
                    </svg>
                    <svg class="checkmark-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display: none;">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                    </svg>
                    <div class="spinner" style="display: none;">
                        <div class="bounce1"></div>
                        <div class="bounce2"></div>
                        <div class="bounce3"></div>
                    </div>
                    <input type="file" id="fileUpload" style="display: none;" accept="video/mp4,video/quicktime,.mov">
                </div>

                <div id="resultArea" class="result-area">
                    <div class="animation-container">
                        <svg class="animation-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                            <path class="wave" d="M0 50 Q25 40, 50 50 T100 50"></path>
                            <path class="wave" d="M0 50 Q25 60, 50 50 T100 50"></path>
                            <path class="wave" d="M0 50 Q25 45, 50 55 T100 50"></path>
                        </svg>
                    </div>
                    <div class="result-notification">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <span>Previews: ~5 min. Full: ~8 sec/video frame.</span>
                    </div>
                    <div class="loading-bar">
                        <!-- Progress segments will be dynamically added here by JavaScript -->
                    </div>
                    <div class="result-content"></div>
                </div>
            </div>
            <div class="prompt-area">
                <div class="prompt-template">
                    <input type="text" id="mediumSubject" placeholder="Ex: A fuzzy teddy bear playing soccer" data-helper="PROMPT.MAIN">
                    <select id="style" data-helper="STYLE.SELECT">
                        <option value="" selected disabled>Select Style</option>
                        <option value="dreamshaperXL.safetensors">General</option>
                        <option value="Juggernaut-X-RunDiffusion.safetensors">Photorealism</option>
                        <option value="xlMerges_xl012rb2.safetensors">Animation</option>
                        <option value="crystalClear3D_v10.safetensors">3D Render</option>
                    </select>
                    <div class="background-input-group">
                        <input type="text" id="background" placeholder="Ex: The Amazon jungle" data-helper="PROMPT.BACKGROUND">
                        <div class="vertical-separator"></div>
                        <div class="toggle-container" data-helper="PROMPT.AUTO_IMPROVE">
                            <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path opacity="0.1" d="M21 12.1818L16.9354 13.6599C16.3462 13.8741 15.8916 14.3521 15.7073 14.9513L14.1538 20C14.1072 20.1515 13.8928 20.1515 13.8461 20L12.2927 14.9513C12.1083 14.3521 11.6537 13.8741 11.0646 13.6599L6.99999 12.1818C6.83019 12.1201 6.83019 11.8799 6.99999 11.8182L11.0646 10.3401C11.6537 10.1259 12.1083 9.64786 12.2927 9.04872L13.8461 4C13.8928 3.8485 14.1072 3.8485 14.1538 4L15.7073 9.04872C15.8916 9.64786 16.3462 10.1259 16.9354 10.3401L21 11.8182C21.1698 11.8799 21.1698 12.1201 21 12.1818Z" fill="currentColor"/>
                                <path d="M21 12.1818L16.9354 13.6599C16.3462 13.8741 15.8916 14.3521 15.7073 14.9513L14.1538 20C14.1072 20.1515 13.8928 20.1515 13.8461 20L12.2927 14.9513C12.1083 14.3521 11.6537 13.8741 11.0646 13.6599L6.99999 12.1818C6.83019 12.1201 6.83019 11.8799 6.99999 11.8182L11.0646 10.3401C11.6537 10.1259 12.1083 9.64786 12.2927 9.04872L13.8461 4C13.8928 3.8485 14.1072 3.8485 14.1538 4L15.7073 9.04872C15.8916 9.64786 16.3462 10.1259 16.9354 10.3401L21 11.8182C21.1698 11.8799 21.1698 12.1201 21 12.1818Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M3.75 5.25C4.22214 5.40738 4.59262 5.77786 4.75 6.25C4.83008 6.49025 5.16992 6.49025 5.25 6.25C5.40738 5.77786 5.77786 5.40738 6.25 5.25C6.49025 5.16992 6.49025 4.83008 6.25 4.75C5.77786 4.59262 5.40738 4.22214 5.25 3.75C5.16992 3.50975 4.83008 3.50975 4.75 3.75C4.59262 4.22214 4.22214 4.59262 3.75 4.75C3.50975 4.83008 3.50975 5.16992 3.75 5.25Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M7.25 19.25C6.77786 19.4074 6.40738 19.7779 6.25 20.25C6.16992 20.4903 5.83008 20.4903 5.75 20.25C5.59262 19.7779 5.22214 19.4074 4.75 19.25C4.50975 19.1699 4.50975 18.8301 4.75 18.75C5.22214 18.5926 5.59262 18.2221 5.75 17.75C5.83008 17.5097 6.16992 17.5097 6.25 17.75C6.40738 18.2221 6.77786 18.5926 7.25 18.75C7.49025 18.8301 7.49025 19.1699 7.25 19.25Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <label class="switch">
                                <input type="checkbox" id="autoImproveToggle" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="toggle-container" data-helper="SOUND_GEN_TOGGLE">
                            <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                            <label class="switch">
                                <input type="checkbox" id="replaceAudioToggle" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="prompt-helper">
                    <span class="helper-icon">?</span>
                    <span id="helperText" class="helper-text"></span>
                </div>
            </div>
            <div class="generate-button-area">
                <div class="credit-info">
                    <span id="creditBalance">Credits: 1000</span>
                    <span class="estimated-cost">Estimated cost: <span id="estimatedCost">0</span> credits</span>
                    <button id="topUpButton" class="top-up-button">Top-up Credits</button>
                </div>
                <div class="button-container">
                    <a href="#advanced" id="advancedButton" class="advanced-button">
                        <span id="moreOptionsText">More Options</span>
                    </a>
                    <div class="split-button">
                        <div class="preview-button-wrapper">
                            <button id="previewButton" class="generate-button preview-button">Preview</button>
                        </div>
                        <div class="full-gen-button-wrapper">
                            <button id="fullGenerationButton" class="generate-button">Full Generation</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="advanced" class="advanced-section">
        <div id="osControls" class="os-controls-mount"></div>
    </div>

    <div id="debug" class="debug-section">
        <h3>Debug</h3>
        <div class="debug-setting">
            <label for="manualFilePath">Manual Video File Path:</label>
            <input type="text" id="manualFilePath" placeholder="Enter video file path">
            <button id="useManualPath">Use Manual Path</button>
        </div>
        <div class="debug-setting">
            <label for="faceImagePath">Face Image Path:</label>
            <input type="text" id="faceImagePath" placeholder="Enter face image path">
            <button id="useFaceImagePath">Use Face Image Path</button>
        </div>
        <div class="debug-setting">
            <label for="styleImagePath">Style Transfer Image Path:</label>
            <input type="text" id="styleImagePath" placeholder="Enter style image path">
            <button id="useStyleImagePath">Use Style Image Path</button>
        </div>
    </div>

        <div class="go-back-button-container">
            <a href="#top" id="goBackButton" class="go-back-button">Go back</a>
        </div>

    <div id="footer-placeholder"></div>
    <script type="module" src="/js/ui/includes.js"></script>
    <script>
      function relocateModeIndicator() {
        const header = document.querySelector('header .header-content');
        const mode = document.querySelector('.mode-indicator');
        if (header && mode && !header.contains(mode)) {
          const auth = header.querySelector('.auth-buttons');
          header.insertBefore(mode, auth || null);
        }
      }
      // Ensure relocation regardless of event timing
      document.addEventListener('headerLoaded', relocateModeIndicator);
      document.addEventListener('includes:loaded', relocateModeIndicator);
      // Try immediately in case header already injected before listeners attached
      relocateModeIndicator();
    </script>
    <script src="/js/config.js"></script>
    <script type="module" src="/js/entry-point.js"></script>
    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/auth/signup-modal.js"></script>
    <script type="module" src="/js/auth/history-modal.js"></script>
    <script type="module" src="/js/ui/genericModal.js"></script>
    <script type="module" src="/js/verification.js"></script>
    <!-- Mobile enhancements only loaded on mobile devices -->
    <script type="module" src="/js/ui/mobile.js" media="(max-width: 768px)"></script>
</body>
</html>
